<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Admin Chat - Video Calling System</title>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }
    
    body { 
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; 
        padding: 12px;
        max-width: 800px;
        margin: 0 auto;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .container {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        width: 100%;
    }
    
    @media (max-width: 600px) {
        body { padding: 8px; }
        .container { padding: 15px; }
        button { padding: 12px 20px; }
        input, select { font-size: 16px; }
        .incoming-buttons button { padding: 12px 20px !important; font-size: 16px !important; }
    }
    
    #chat { 
        height: 350px; 
        overflow: auto; 
        border: 1px solid #e0e0e0; 
        padding: 15px; 
        margin-bottom: 10px; 
        border-radius: 12px;
        background: #fafafa;
    }
    
    button { 
        padding: 12px 24px; 
        margin: 5px; 
        cursor: pointer; 
        border-radius: 12px; 
        border: none;
        font-weight: 600;
        transition: all 0.3s ease;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
    }
    
    button:hover:not(:disabled) { transform: translateY(-2px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    
    input, select { 
        padding: 12px; 
        border: 2px solid #e0e0e0; 
        border-radius: 12px; 
        font-size: 14px;
    }
    
    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding-bottom: 20px;
        border-bottom: 2px solid rgba(102, 126, 234, 0.2);
        flex-wrap: wrap;
        gap: 15px;
    }
    
    .status-indicator {
        display: inline-block;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        margin-right: 8px;
        animation: pulse 2s infinite;
    }
    
    .status-connected { 
        background-color: #28a745;
        box-shadow: 0 0 10px #28a745;
    }
    
    .status-disconnected { 
        background-color: #dc3545;
        box-shadow: 0 0 10px #dc3545;
    }
    
    @keyframes pulse {
        0% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(1.1); }
        100% { opacity: 1; transform: scale(1); }
    }
    
    .action-buttons {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin: 15px 0;
    }
    
    .btn-success { background: linear-gradient(135deg, #28a745 0%, #20c997 100%); }
    .btn-danger { background: linear-gradient(135deg, #dc3545 0%, #c82333 100%); }
    .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    
    /* Incoming Call Modal */
    .incoming-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        z-index: 10000;
        text-align: center;
        padding-top: 120px;
        color: white;
    }
    
    .incoming-modal.active {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }
    
    .incoming-modal h2 {
        font-size: 36px;
        margin-bottom: 20px;
    }
    
    .incoming-avatar {
        font-size: 120px;
        margin: 30px;
        animation: bounce 2s infinite;
    }
    
    @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-20px); }
    }
    
    .incoming-name {
        font-size: 28px;
        margin-bottom: 50px;
        font-weight: 300;
    }
    
    .incoming-buttons {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
    }
    
    .incoming-buttons button {
        padding: 15px 40px;
        font-size: 20px;
        border-radius: 50px;
        min-width: 200px;
        margin: 10px;
    }
    
    .accept-btn {
        background: white;
        color: #28a745;
    }
    
    .reject-btn {
        background: white;
        color: #dc3545;
    }
    
    /* Video Container */
    #videoContainer {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 1000;
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        background: rgba(0,0,0,0.2);
        padding: 15px;
        border-radius: 15px;
        max-width: 500px;
    }
    
    #videoContainer video {
        width: 200px;
        height: 150px;
        border-radius: 12px;
        object-fit: cover;
        border: 3px solid #667eea;
        background: #333;
    }
    
    #callTimer {
        font-size: 18px;
        font-weight: bold;
        color: #28a745;
        display: none;
        background: #e8f5e9;
        padding: 15px;
        border-radius: 12px;
        margin: 10px 0;
        text-align: center;
    }
    
    #endCallBtn {
        display: none;
    }
    
    /* Call Screen */
    .call-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        z-index: 10000;
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
    }
    
    .call-screen.active {
        display: flex;
    }
    
    .call-timer {
        font-size: 72px;
        font-weight: bold;
        margin-bottom: 40px;
        font-family: 'Courier New', monospace;
        background: rgba(255,255,255,0.1);
        padding: 20px 40px;
        border-radius: 60px;
    }
    
    .call-end-btn {
        background: #ff6b6b;
        padding: 20px 60px;
        font-size: 24px;
        border-radius: 60px;
        margin-top: 40px;
    }
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h2 style="margin:0;">👑 Admin Dashboard</h2>
            <div id="connectionStatus">
                <span class="status-indicator status-disconnected" id="callStatusIndicator"></span>
                <span id="callStatusText">Not in call</span>
            </div>
        </div>
        <div>
            <a href="/logout" style="color: #dc3545; text-decoration: none; font-weight: bold; padding: 10px 20px; border: 2px solid #dc3545; border-radius: 30px; display: inline-block;">🚪 Logout</a>
        </div>
    </div>

    <select id="user">
        {% for u in users %}
        <option value="{{u[0]}}">{{u[1]}}</option>
        {% endfor %}
    </select>

    <div id="chat"></div>

    <div style="display: flex; gap: 10px; margin: 15px 0; flex-wrap: wrap;">
        <input id="msg" placeholder="Type message..." style="flex: 1; min-width: 200px;">
        <button onclick="sendMsg()" class="btn-success">📤 Send</button>
    </div>

    <div class="action-buttons">
        <button id="audioCallBtn" onclick="makeAudioCall()" class="btn-primary">🎤 Audio Call</button>
        <button id="videoCallBtn" onclick="makeVideoCall()" class="btn-primary">📹 Video Call</button>
        <button id="endCallBtn" onclick="endCall()" class="btn-danger">🔴 End Call</button>
    </div>
    
    <div id="callTimer">
        ⏱ Call Time: <span id="timer">00:00</span>
    </div>
</div>

<!-- Incoming Call Modal -->
<div id="incomingModal" class="incoming-modal">
    <h2>📞 Incoming Call</h2>
    <div class="incoming-avatar">👤</div>
    <div class="incoming-name" id="incomingName">User Calling...</div>
    <div class="incoming-buttons">
        <button class="accept-btn" onclick="acceptIncomingCall()">✅ Answer</button>
        <button class="reject-btn" onclick="rejectIncomingCall()">❌ Reject</button>
    </div>
</div>

<!-- Call Screen -->
<div class="call-screen" id="callScreen">
    <div class="call-info" id="callInfo">Call with User</div>
    <div class="call-type" id="callTypeDisplay">Audio Call</div>
    <div class="call-timer" id="callTimerDisplay">00:00</div>
    <button class="call-end-btn" onclick="endCall()">End Call</button>
</div>

<script>
// ============================================
// ADMIN APPLICATION WITH WORKING WEBRTC
// ============================================

let localStream = null;
let remoteStream = null;
let peerConnection = null;
let currentCall = null;
let currentCallerId = null;
let timerInterval = null;
let seconds = 0;
let callStatusInterval = null;
let ringtoneInterval = null;

// Get DOM elements
const chatBox = document.getElementById("chat");
const msgInput = document.getElementById("msg");
const selectedUserSelect = document.getElementById("user");
const incomingModal = document.getElementById("incomingModal");
const incomingName = document.getElementById("incomingName");
const callTimer = document.getElementById("callTimer");
const timerSpan = document.getElementById("timer");
const callScreen = document.getElementById("callScreen");
const callTimerDisplay = document.getElementById("callTimerDisplay");
const callInfo = document.getElementById("callInfo");
const callTypeDisplay = document.getElementById("callTypeDisplay");

// WebRTC Configuration
const configuration = {
    iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun2.l.google.com:19302' }
    ]
};

// Media permissions state
let mediaPermissions = {
    audio: false,
    video: false
};

let pendingCallData = null;

// ---------- Helper Functions ----------
function debugLog(...args) {
    console.log(...args);
}

async function checkMediaPermissions() {
    try {
        // Test audio
        try {
            const audioStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            mediaPermissions.audio = true;
            audioStream.getTracks().forEach(track => track.stop());
            debugLog('Audio permission granted');
        } catch (audioErr) {
            mediaPermissions.audio = false;
            debugLog('Audio permission error:', audioErr.message);
        }
        
        // Test video
        try {
            const videoStream = await navigator.mediaDevices.getUserMedia({ audio: false, video: true });
            mediaPermissions.video = true;
            videoStream.getTracks().forEach(track => track.stop());
            debugLog('Video permission granted');
        } catch (videoErr) {
            mediaPermissions.video = false;
            debugLog('Video permission error:', videoErr.message);
        }
        
        // Update button states
        updateButtonStates();
        
        return mediaPermissions.audio;
    } catch (err) {
        debugLog('Permission test failed:', err);
        return false;
    }
}

function updateButtonStates() {
    const audioBtn = document.getElementById('audioCallBtn');
    const videoBtn = document.getElementById('videoCallBtn');
    
    if (audioBtn) audioBtn.disabled = !mediaPermissions.audio;
    if (videoBtn) videoBtn.disabled = !mediaPermissions.video;
}

// ---------- API calls for WebRTC signaling ----------
async function apiPost(url, data) {
    try {
        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        if (!res.ok) {
            const error = await res.json();
            throw new Error(error.error || `HTTP ${res.status}`);
        }
        return await res.json();
    } catch (err) {
        debugLog('API POST error:', url, err);
        return { error: err.message };
    }
}

// ---------- WebRTC Call Functions ----------
async function makeAudioCall() {
    const target = selectedUserSelect.value;
    if (!target) {
        alert('Please select a user first');
        return;
    }
    await initiateCall(target, false);
}

async function makeVideoCall() {
    const target = selectedUserSelect.value;
    if (!target) {
        alert('Please select a user first');
        return;
    }
    await initiateCall(target, true);
}

async function initiateCall(target, withVideo) {
    if (currentCall) {
        alert('You are already in a call');
        return;
    }

    debugLog('Initiating call to', target, 'with video:', withVideo);
    
    try {
        const response = await fetch("/start_call", {
            method: "POST",
            headers: {"Content-Type": "application/x-www-form-urlencoded"},
            body: "receiver=" + target + "&call_type=" + (withVideo ? 'video' : 'audio')
        });
        
        const data = await response.json();
        
        if (data.status === "calling") {
            alert(`Calling user...`);
            startWaitingForAcceptance(target, withVideo);
        }
    } catch (err) {
        debugLog('Call initiation error:', err);
        alert('Failed to start call: ' + err.message);
    }
}

function startWaitingForAcceptance(target, withVideo) {
    if (callStatusInterval) clearInterval(callStatusInterval);
    
    callStatusInterval = setInterval(async () => {
        try {
            const res = await fetch("/call_status");
            const status = await res.json();
            
            if (status === "accepted") {
                clearInterval(callStatusInterval);
                await startCall(target, withVideo, false);
            } else if (status === "rejected") {
                clearInterval(callStatusInterval);
                alert("Call was rejected");
            }
        } catch (err) {
            debugLog('Error checking call status:', err);
        }
    }, 1000);
}

async function startCall(target, withVideo, isAnswerer = false) {
    try {
        const constraints = {
            audio: true,
            video: withVideo && mediaPermissions.video ? {
                width: { ideal: 640 },
                height: { ideal: 480 }
            } : false
        };
        
        localStream = await navigator.mediaDevices.getUserMedia(constraints);
        debugLog('Media access granted');
        
        // Show call screen
        showCallScreen(withVideo);
        
        // Show local video if video call
        if (withVideo && mediaPermissions.video) {
            showLocalVideo();
        }
        
        // Create peer connection
        await createPeerConnection(target);
        
        currentCall = { with: target, type: withVideo ? 'video' : 'audio' };
        
        // If not answerer, send offer
        if (!isAnswerer) {
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            await apiPost('/api/webrtc/offer', {
                to: target,
                offer: peerConnection.localDescription
            });
        }
        
        // Update UI
        updateCallStatus(true);
        startTimer();
        
        // Hide incoming modal if visible
        incomingModal.classList.remove('active');
        
    } catch (err) {
        debugLog('Media access error:', err);
        if (err.name === 'NotAllowedError') {
            alert('Please allow camera/microphone access to make calls');
        } else {
            alert('Could not access media: ' + err.message);
        }
        endCall();
    }
}

async function createPeerConnection(target) {
    peerConnection = new RTCPeerConnection(configuration);
    remoteStream = new MediaStream();
    
    // Add local tracks
    localStream.getTracks().forEach(track => {
        peerConnection.addTrack(track, localStream);
    });
    
    // Handle remote tracks
    peerConnection.ontrack = event => {
        debugLog('Received remote track:', event.track.kind);
        event.streams[0].getTracks().forEach(track => {
            remoteStream.addTrack(track);
        });
        
        // Show remote video if video call
        if (currentCall && currentCall.type === 'video') {
            showRemoteVideo();
        }
    };
    
    // Handle ICE candidates
    peerConnection.onicecandidate = event => {
        if (event.candidate) {
            debugLog('Sending ICE candidate');
            apiPost('/api/webrtc/ice', {
                to: target,
                candidate: event.candidate
            });
        }
    };
    
    // Connection state changes
    peerConnection.onconnectionstatechange = () => {
        debugLog('Connection state:', peerConnection.connectionState);
        if (peerConnection.connectionState === 'disconnected' ||
                   peerConnection.connectionState === 'failed' ||
                   peerConnection.connectionState === 'closed') {
            endCall();
        }
    };
}

function showCallScreen(withVideo) {
    if (callInfo) callInfo.textContent = 'Call with User';
    if (callTypeDisplay) callTypeDisplay.textContent = withVideo ? '📹 Video Call' : '📞 Audio Call';
    if (callScreen) callScreen.classList.add('active');
}

function showLocalVideo() {
    let videoContainer = document.getElementById('videoContainer');
    if (!videoContainer) {
        videoContainer = document.createElement('div');
        videoContainer.id = 'videoContainer';
        document.body.appendChild(videoContainer);
    }
    
    videoContainer.innerHTML = '';
    
    const localVideo = document.createElement('video');
    localVideo.id = 'localVideo';
    localVideo.srcObject = localStream;
    localVideo.autoplay = true;
    localVideo.muted = true;
    localVideo.playsInline = true;
    videoContainer.appendChild(localVideo);
}

function showRemoteVideo() {
    let videoContainer = document.getElementById('videoContainer');
    if (!videoContainer) return;
    
    const remoteVideo = document.createElement('video');
    remoteVideo.id = 'remoteVideo';
    remoteVideo.srcObject = remoteStream;
    remoteVideo.autoplay = true;
    remoteVideo.playsInline = true;
    videoContainer.appendChild(remoteVideo);
}

function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    seconds = 0;
    if (timerSpan) timerSpan.textContent = '00:00';
    if (callTimerDisplay) callTimerDisplay.textContent = '00:00';
    if (callTimer) callTimer.style.display = 'block';
    
    timerInterval = setInterval(() => {
        seconds++;
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        const timeStr = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        if (timerSpan) timerSpan.textContent = timeStr;
        if (callTimerDisplay) callTimerDisplay.textContent = timeStr;
    }, 1000);
}

function endCall() {
    debugLog('Ending call');
    
    // Notify server
    if (currentCall) {
        fetch("/end_call", { method: "POST" });
        apiPost('/api/webrtc/hangup', { to: currentCall.with });
    }
    
    // Clean up peer connection
    if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
    }
    
    // Stop local stream
    if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
        localStream = null;
    }
    
    // Remove video elements
    const videoContainer = document.getElementById('videoContainer');
    if (videoContainer) videoContainer.remove();
    
    // Hide call screen
    if (callScreen) callScreen.classList.remove('active');
    
    // Stop timer
    if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
    }
    
    // Hide timer
    if (callTimer) callTimer.style.display = 'none';
    
    // Update UI
    updateCallStatus(false);
    
    // Clear pending call
    pendingCallData = null;
    currentCallerId = null;
    currentCall = null;
    
    // Clear call status interval
    if (callStatusInterval) {
        clearInterval(callStatusInterval);
        callStatusInterval = null;
    }
    
    // Stop ringtone
    if (ringtoneInterval) {
        clearInterval(ringtoneInterval);
        ringtoneInterval = null;
    }
    
    debugLog('Call ended');
}

function updateCallStatus(inCall) {
    const indicator = document.getElementById('callStatusIndicator');
    const text = document.getElementById('callStatusText');
    const endCallBtn = document.getElementById('endCallBtn');
    
    if (inCall) {
        if (indicator) indicator.className = 'status-indicator status-connected';
        if (text) text.innerText = 'In call';
        if (endCallBtn) endCallBtn.style.display = 'inline-block';
    } else {
        if (indicator) indicator.className = 'status-indicator status-disconnected';
        if (text) text.innerText = 'Not in call';
        if (endCallBtn) endCallBtn.style.display = 'none';
    }
}

// ---------- Incoming Call Handlers ----------
function showIncomingCall(callerId, callerName, callType) {
    debugLog('Showing incoming call from', callerName);
    pendingCallData = { callerId, callerName, callType };
    currentCallerId = callerId;
    
    incomingName.innerHTML = `${callerName}<br><small style="font-size:16px;">${callType === 'video' ? '📹 Video Call' : '📞 Audio Call'}</small>`;
    incomingModal.classList.add('active');
    
    // Play ringtone
    try {
        function playBeep() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.frequency.value = 440;
            gainNode.gain.value = 0.3;
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.5);
        }
        
        playBeep();
        ringtoneInterval = setInterval(playBeep, 2000);
    } catch (err) {
        debugLog('Ringtone error:', err);
    }
}

async function acceptIncomingCall() {
    if (!pendingCallData) return;
    
    // Clear ringtone
    if (ringtoneInterval) {
        clearInterval(ringtoneInterval);
        ringtoneInterval = null;
    }
    
    const { callerId, callType } = pendingCallData;
    const withVideo = callType === 'video';
    
    try {
        // Find the call ID and accept it
        const res = await fetch("/check_call");
        const call = await res.json();
        
        if (call.id) {
            await fetch("/accept_call/" + call.id);
            await startCall(callerId, withVideo, true);
        }
    } catch (err) {
        debugLog('Error accepting call:', err);
        alert('Failed to accept call: ' + err.message);
    }
    
    incomingModal.classList.remove('active');
    pendingCallData = null;
}

async function rejectIncomingCall() {
    if (!pendingCallData) return;
    
    // Clear ringtone
    if (ringtoneInterval) {
        clearInterval(ringtoneInterval);
        ringtoneInterval = null;
    }
    
    try {
        const res = await fetch("/check_call");
        const call = await res.json();
        
        if (call.id) {
            await fetch("/reject_call/" + call.id);
        }
    } catch (err) {
        debugLog('Error rejecting call:', err);
    }
    
    incomingModal.classList.remove('active');
    pendingCallData = null;
    currentCallerId = null;
}

// ---------- CRITICAL: Poll for Incoming Calls ----------
async function checkIncomingCalls() {
    // Don't check if already in a call or already showing incoming modal
    if (currentCall || incomingModal.classList.contains('active')) {
        return;
    }
    
    try {
        const res = await fetch("/check_call");
        const call = await res.json();
        
        if (call && call.id) {
            debugLog('Incoming call detected:', call);
            showIncomingCall(call.caller_id, call.name, call.call_type);
        }
    } catch (err) {
        debugLog('Error checking incoming calls:', err);
    }
}

async function pollWebRTCEvents() {
    try {
        const res = await fetch('/api/webrtc/events');
        if (!res.ok) return;
        
        const events = await res.json();
        for (let ev of events) {
            await handleWebRTCEvent(ev);
        }
    } catch (err) {
        debugLog('Error polling events:', err);
    }
}

async function handleWebRTCEvent(ev) {
    debugLog('WebRTC event:', ev);
    
    switch (ev.type) {
        case 'offer':
            if (currentCall) {
                debugLog('Already in call, ignoring offer');
                return;
            }
            
            const withVideo = ev.offer.sdp.includes('video');
            // This should be handled by checkIncomingCalls, but just in case
            if (!incomingModal.classList.contains('active')) {
                try {
                    const res = await fetch("/check_call");
                    const call = await res.json();
                    if (call && call.id) {
                        showIncomingCall(ev.from, call.name, withVideo ? 'video' : 'audio');
                    }
                } catch (err) {
                    debugLog('Error getting caller info:', err);
                }
            }
            break;
            
        case 'answer':
            if (peerConnection) {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(ev.answer));
            }
            break;
            
        case 'ice':
            if (peerConnection) {
                try {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(ev.candidate));
                } catch (err) {
                    debugLog('Error adding ICE candidate:', err);
                }
            }
            break;
            
        case 'hangup':
            if (currentCall) {
                alert('Call ended by other user');
                endCall();
            }
            break;
    }
}

// ---------- Chat Functions ----------
function sendMsg() {
    if (!selectedUserSelect.value) {
        alert("Select user first");
        return;
    }
    
    const msg = msgInput.value.trim();
    if (!msg) return;

    fetch("/send", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: "receiver=" + selectedUserSelect.value + "&message=" + encodeURIComponent(msg)
    })
    .then(() => { msgInput.value = ""; });
}

function loadChat() {
    if (!selectedUserSelect.value) return;
    
    fetch("/messages/" + selectedUserSelect.value)
    .then(r => r.json())
    .then(data => {
        if (data && data.length > 0) {
            chatBox.innerHTML = "";
            data.forEach(m => {
                const isMe = m[0] === 'Admin';
                const align = isMe ? 'right' : 'left';
                const bgColor = isMe ? 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)' : '#f5f5f5';
                const textColor = isMe ? 'white' : '#333';
                chatBox.innerHTML += `
                    <div style="text-align:${align}; margin:8px 0;">
                        <span style="background:${bgColor}; color:${textColor}; padding:10px 18px; border-radius:${isMe ? '18px 18px 4px 18px' : '18px 18px 18px 4px'}; display:inline-block; max-width:80%;">
                            <b>${m[0]}:</b> ${m[1]}
                        </span>
                    </div>
                `;
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    });
}

// ---------- Initialization ----------
window.onload = async function() {
    debugLog('Admin app initializing...');
    
    await checkMediaPermissions();
    
    // CRITICAL: Poll for incoming calls every 1 second
    setInterval(checkIncomingCalls, 1000);
    
    // Poll for WebRTC events every 500ms
    setInterval(pollWebRTCEvents, 500);
    
    // Poll messages every 2 seconds
    setInterval(loadChat, 2000);
    
    // Ping to keep session alive
    setInterval(() => {
        fetch('/api/webrtc/ping', { method: 'POST' });
    }, 30000);
    
    // Check call status periodically to detect when other user ends call
    setInterval(async () => {
        if (currentCall) {
            try {
                const res = await fetch("/call_status");
                const status = await res.json();
                if (status === "ended" || status === "rejected") {
                    debugLog('Call ended by remote user');
                    alert('Call ended by other user');
                    endCall();
                }
            } catch (err) {
                debugLog('Error checking call status:', err);
            }
        }
    }, 2000);
    
    loadChat();
};

// Make functions global for HTML buttons
window.makeAudioCall = makeAudioCall;
window.makeVideoCall = makeVideoCall;
window.endCall = endCall;
window.sendMsg = sendMsg;
window.acceptIncomingCall = acceptIncomingCall;
window.rejectIncomingCall = rejectIncomingCall;
</script>
